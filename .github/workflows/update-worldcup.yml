name: Update World Cup Data

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Import World Cup
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/import-worldcup.js

      - name: Import Scorers
        continue-on-error: true
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/import-scorers.js

      - name: Generate Standings
        run: node scripts/generar-posiciones.js

      - name: Generate Statistics
        run: node scripts/generar-estadisticas.js

      - name: Generate Playoff
        run: node scripts/generar-playoff.js

      - name: Commit Changes
        run: |
          git config user.name "WhatsCup Bot"
          git config user.email "bot@whatscup.com"

          git add data/*.json

          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Update World Cup data"

          git pull --rebase origin main || true

          git push origin HEAD:main || true
